<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebPrint</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f0f2f5;
            height: 100vh;
            overflow: hidden;
        }
        .layout { display: flex; height: 100vh; }

        /* 左侧控制面板 - 1/3 宽度 */
        .sidebar {
            width: 33.3%;
            min-width: 360px;
            max-width: 480px;
            background: white;
            border-right: 1px solid #e0e0e0;
            overflow-y: auto;
            padding: 24px 28px;
        }
        .sidebar h1 { font-size: 22px; margin-bottom: 4px; color: #333; }
        .sidebar .subtitle { color: #888; font-size: 13px; margin-bottom: 20px; }

        .tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 18px; }
        .tab {
            flex: 1; padding: 10px; text-align: center; cursor: pointer;
            font-size: 14px; font-weight: 500; color: #888;
            border-bottom: 2px solid transparent; margin-bottom: -2px;
        }
        .tab.active { color: #0078d4; border-bottom-color: #0078d4; }
        .tab:hover { color: #0078d4; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .field { margin-bottom: 14px; }
        .field label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; font-weight: 500; }
        .field select, .field input[type="text"], .field input[type="number"] {
            width: 100%; padding: 8px 12px; border: 1px solid #ddd;
            border-radius: 6px; font-size: 14px;
        }
        .field input[type="file"] { font-size: 14px; }

        /* 地点选择 */
        .location-bar {
            display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px;
        }
        .location-btn {
            padding: 5px 12px; border: 1px solid #ddd; border-radius: 16px;
            background: #f9f9f9; cursor: pointer; font-size: 12px; color: #555;
            transition: all 0.2s;
        }
        .location-btn:hover { border-color: #0078d4; color: #0078d4; }
        .location-btn.active { background: #0078d4; color: white; border-color: #0078d4; }

        .status { display: flex; align-items: center; gap: 6px; margin-bottom: 16px; font-size: 12px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
        .status-dot.idle { background: #4caf50; }
        .status-dot.busy { background: #ff9800; }
        .status-dot.error { background: #f44336; }

        .btn {
            width: 100%; padding: 11px; border: none; border-radius: 6px;
            font-size: 15px; font-weight: 500; cursor: pointer; margin-bottom: 8px;
        }
        .btn-primary { background: #0078d4; color: white; }
        .btn-primary:hover { background: #106ebe; }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
        .btn-success { background: #4caf50; color: white; }
        .btn-success:hover { background: #388e3c; }
        .btn-danger { background: #f5f5f5; color: #666; border: 1px solid #ddd; }
        .btn-danger:hover { background: #eee; }

        .message { text-align: center; font-size: 13px; color: #666; margin: 8px 0; }
        .message.error { color: #f44336; }
        .message.success { color: #4caf50; }
        .loading { display: none; text-align: center; margin: 8px 0; color: #0078d4; font-size: 13px; }
        .page-count { text-align: center; font-size: 14px; font-weight: 500; color: #333; margin: 12px 0; }

        /* 右侧预览区 */
        .preview-area {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #525659; position: relative;
        }
        .preview-area .placeholder { color: #aaa; font-size: 15px; }
        .preview-area iframe {
            width: 100%; height: 100%; border: none; display: none;
            pointer-events: auto;
        }
        .preview-area.dragover iframe {
            pointer-events: none;
        }
        .preview-area.dragover {
            background: #3a3d40;
            outline: 3px dashed #0078d4;
            outline-offset: -12px;
        }
        .pdf-info-bar {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.7); color: white;
            padding: 8px 16px; font-size: 13px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <h1>🖨️ WebPrint</h1>
            <p class="subtitle">网络打印服务</p>

            <!-- 办公地点 -->
            <div class="field">
                <label>办公地点</label>
                <select id="locationSelect" onchange="onLocationChange()">
                    <option value="">手动输入 IP</option>
                </select>
            </div>

            <div class="field">
                <label>打印机 IP</label>
                <input type="text" id="printerIp" placeholder="选择地点或手动输入 IP">
            </div>
            <div class="status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">未连接</span>
                <button onclick="checkStatus()" style="margin-left:auto;padding:3px 10px;border:1px solid #ddd;border-radius:4px;background:white;cursor:pointer;font-size:11px;">检测</button>
            </div>
            <div id="markerInfo" style="display:none;margin-bottom:14px;padding:10px 12px;background:#f9f9f9;border-radius:6px;font-size:12px;"></div>

            <div class="tabs">
                <div class="tab active" onclick="switchTab('print')">🖨️ 打印</div>
                <div class="tab" onclick="switchTab('scan')">📄 扫描</div>
            </div>

            <!-- 打印面板 -->
            <div class="tab-content active" id="tab-print">
                <div class="field">
                    <label>选择文件</label>
                    <input type="file" id="printFile" multiple accept=".pdf,.jpg,.jpeg,.png,.docx,.doc,.xlsx,.xls,.pptx,.ppt,.csv" onchange="onFileSelected()">
                </div>
                <div id="fileList" style="display:none;margin-bottom:14px;"></div>
                <div id="printSettings" style="display:none;">
                    <div class="field">
                        <label>打印页码</label>
                        <input type="text" id="pages" placeholder="全部（或 1-3, 5, 8-10）">
                    </div>
                    <div class="field">
                        <label>份数</label>
                        <input type="number" id="copies" value="1" min="1" max="99">
                    </div>
                    <div class="field">
                        <label>双面打印</label>
                        <select id="duplex">
                            <option value="one-sided">单面</option>
                            <option value="two-sided-long-edge">双面（长边翻转）</option>
                            <option value="two-sided-short-edge">双面（短边翻转）</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>色彩</label>
                        <select id="colorMode">
                            <option value="color">彩色</option>
                            <option value="monochrome">黑白</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>方向</label>
                        <select id="orientation">
                            <option value="portrait">纵向</option>
                            <option value="landscape">横向</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>缩放 (%)</label>
                        <input type="number" id="scaling" value="100" min="10" max="200">
                    </div>
                </div>
                <div class="loading" id="printLoading">⏳ 正在处理...</div>
                <p class="message" id="printMessage"></p>
                <button class="btn btn-primary" id="printBtn" onclick="doPrint()" style="display:none;">打印</button>
            </div>

            <!-- 扫描面板 -->
            <div class="tab-content" id="tab-scan">
                <p style="font-size:13px;color:#e67e22;margin-bottom:14px;padding:8px 12px;background:#fef9e7;border-radius:6px;">⚠️ 仅支持平板扫描（玻璃面板），不支持进纸器（ADF）</p>
                <div class="field">
                    <label>分辨率</label>
                    <select id="dpi">
                        <option value="200">200 DPI（快速）</option>
                        <option value="300" selected>300 DPI（标准）</option>
                        <option value="600">600 DPI（高清）</option>
                    </select>
                </div>
                <div class="field">
                    <label>颜色</label>
                    <select id="color">
                        <option value="RGB24">彩色</option>
                        <option value="Grayscale8">灰度</option>
                    </select>
                </div>
                <div class="page-count" id="pageCount" style="display:none;">已扫描 <span id="count">0</span> 页</div>
                <div class="loading" id="scanLoading">⏳ 扫描中...</div>
                <p class="message" id="scanMessage"></p>
                <button class="btn btn-primary" id="scanBtn" onclick="doScan()">开始扫描</button>
                <button class="btn btn-success" id="downloadBtn" onclick="doDownload()" style="display:none;">下载 PDF</button>
                <button class="btn btn-danger" id="cancelBtn" onclick="doCancel()" style="display:none;">取消</button>
            </div>
        </div>

        <!-- 右侧预览 -->
        <div class="preview-area" id="previewArea" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
            <div class="placeholder" id="previewPlaceholder">
                <div style="text-align:center;">
                    <div style="font-size:48px;margin-bottom:12px;">📄</div>
                    <div style="font-size:15px;color:#aaa;">拖放文件到此处</div>
                    <div style="font-size:12px;color:#777;margin-top:6px;">支持 PDF、Word、Excel、图片</div>
                </div>
            </div>
            <iframe id="pdfPreview"></iframe>
            <div class="pdf-info-bar" id="pdfInfoBar"></div>
        </div>
    </div>

    <script>
        let sessionId = null;
        let pageCount = 0;
        let pdfFileUrl = null;

        // 阻止浏览器默认的拖放打开文件行为
        document.addEventListener('dragover', e => e.preventDefault());
        document.addEventListener('drop', e => e.preventDefault());

        // 文件队列
        let fileQueue = [];

        // 拖放处理
        function handleDragOver(e) {
            e.preventDefault();
            e.stopPropagation();
            document.getElementById('previewArea').classList.add('dragover');
        }

        function handleDragLeave(e) {
            e.preventDefault();
            e.stopPropagation();
            document.getElementById('previewArea').classList.remove('dragover');
        }

        function handleDrop(e) {
            e.preventDefault();
            e.stopPropagation();
            document.getElementById('previewArea').classList.remove('dragover');

            const files = e.dataTransfer.files;
            if (files.length > 0) {
                // 追加到现有队列
                const allowed = ['pdf', 'jpg', 'jpeg', 'png', 'docx', 'doc', 'xlsx', 'xls', 'pptx', 'ppt', 'csv'];
                for (let i = 0; i < files.length; i++) {
                    const ext = files[i].name.split('.').pop().toLowerCase();
                    if (allowed.includes(ext)) {
                        fileQueue.push(files[i]);
                    }
                }

                if (fileQueue.length === 0) return;

                // 更新 file input（用于表单兼容）
                const dt = new DataTransfer();
                fileQueue.forEach(f => dt.items.add(f));
                document.getElementById('printFile').files = dt.files;

                // 重新渲染
                onFileSelected();
            }
        }

        // 页面加载时获取地点列表
        document.addEventListener('DOMContentLoaded', loadLocations);

        async function loadLocations() {
            try {
                const resp = await fetch('/api/locations');
                const data = await resp.json();
                const select = document.getElementById('locationSelect');
                for (const [name, ip] of Object.entries(data)) {
                    const opt = document.createElement('option');
                    opt.value = ip;
                    opt.textContent = name;
                    select.appendChild(opt);
                }
            } catch (e) {}
        }

        function onLocationChange() {
            const ip = document.getElementById('locationSelect').value;
            if (ip) {
                document.getElementById('printerIp').value = ip;
                checkStatus();
            } else {
                document.getElementById('printerIp').value = '';
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
        }

        // === 状态检测 ===
        async function checkStatus() {
            const ip = document.getElementById('printerIp').value.trim();
            if (!ip) { document.getElementById('statusText').textContent = '请输入 IP'; return; }
            try {
                const resp = await fetch('/api/status', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({scanner_ip: ip})
                });
                const data = await resp.json();
                const dot = document.getElementById('statusDot');
                const text = document.getElementById('statusText');
                if (data.status === 'idle') { dot.className = 'status-dot idle'; text.textContent = '就绪'; }
                else if (data.status === 'busy') { dot.className = 'status-dot busy'; text.textContent = '忙碌'; }
                else { dot.className = 'status-dot error'; text.textContent = '离线'; }

                // 查询碳粉信息
                if (data.status === 'idle' || data.status === 'busy') {
                    fetchMarkerInfo(ip);
                }
            } catch (e) {
                document.getElementById('statusDot').className = 'status-dot error';
                document.getElementById('statusText').textContent = '无法连接';
            }
        }

        async function fetchMarkerInfo(ip) {
            try {
                const resp = await fetch('/api/printer-info', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({printer_ip: ip})
                });
                const data = await resp.json();
                const el = document.getElementById('markerInfo');
                if (data.markers && data.markers.length > 0) {
                    let html = '<strong>耗材状态：</strong><br>';
                    data.markers.forEach(m => {
                        const level = m.level >= 0 ? m.level + '%' : '未知';
                        const barColor = m.level > 20 ? '#4caf50' : m.level > 5 ? '#ff9800' : '#f44336';
                        html += `<div style="margin-top:4px;display:flex;align-items:center;gap:8px;">`;
                        html += `<span style="width:80px;font-size:11px;">${m.name}</span>`;
                        html += `<div style="flex:1;height:6px;background:#e0e0e0;border-radius:3px;">`;
                        html += `<div style="width:${Math.max(m.level, 0)}%;height:100%;background:${barColor};border-radius:3px;"></div></div>`;
                        html += `<span style="font-size:11px;width:35px;text-align:right;">${level}</span></div>`;
                    });
                    el.innerHTML = html;
                    el.style.display = 'block';
                } else {
                    el.style.display = 'none';
                }
            } catch (e) {
                document.getElementById('markerInfo').style.display = 'none';
            }
        }

        // === 打印功能 ===
        function onFileSelected() {
            const fileInput = document.getElementById('printFile');
            const printSettings = document.getElementById('printSettings');
            const printBtn = document.getElementById('printBtn');
            const message = document.getElementById('printMessage');
            const loading = document.getElementById('printLoading');
            const fileListEl = document.getElementById('fileList');

            message.textContent = '';

            if (!fileInput.files.length) {
                printSettings.style.display = 'none';
                printBtn.style.display = 'none';
                fileListEl.style.display = 'none';
                fileQueue = [];
                hidePreview();
                return;
            }

            const allowed = ['pdf', 'jpg', 'jpeg', 'png', 'docx', 'doc', 'xlsx', 'xls', 'pptx', 'ppt', 'csv'];
            fileQueue = [];

            for (let i = 0; i < fileInput.files.length; i++) {
                const file = fileInput.files[i];
                const ext = file.name.split('.').pop().toLowerCase();
                if (allowed.includes(ext)) {
                    fileQueue.push(file);
                }
            }

            if (fileQueue.length === 0) {
                message.textContent = '没有支持的文件格式';
                message.className = 'message error';
                return;
            }

            // 显示文件列表（始终显示，即使只有一个文件）
            let html = `<div style="font-size:12px;color:#555;margin-bottom:6px;font-weight:500;">打印队列（${fileQueue.length} 个文件）：</div>`;
            fileQueue.forEach((f, i) => {
                html += `<div class="file-item" style="font-size:12px;color:#333;padding:4px 6px;cursor:pointer;border-radius:4px;display:flex;align-items:center;${i === 0 ? 'background:#e8f4fd;' : ''}" data-index="${i}">`;
                html += `<span onclick="previewFile(${i})" style="flex:1;">　${i + 1}. ${f.name} <span style="color:#999;">(${(f.size/1024).toFixed(0)}KB)</span></span>`;
                html += `<span onclick="removeFile(${i})" style="color:#999;cursor:pointer;padding:2px 6px;font-size:14px;" title="移除">✕</span>`;
                html += `</div>`;
            });
            fileListEl.innerHTML = html;
            fileListEl.style.display = 'block';

            printSettings.style.display = 'block';
            printBtn.style.display = 'block';
            loading.style.display = 'block';
            loading.textContent = '⏳ 正在转换预览...';

            // 预览第一个文件
            const formData = new FormData();
            formData.append('file', fileQueue[0]);
            fetch('/api/preview', { method: 'POST', body: formData })
                .then(resp => {
                    if (!resp.ok) return resp.json().then(d => { throw new Error(d.error); });
                    const pages = resp.headers.get('X-Page-Count');
                    return resp.blob().then(blob => ({ blob, pages }));
                })
                .then(({ blob, pages }) => {
                    showPreview(blob);
                    let info = `${fileQueue[0].name}（${(fileQueue[0].size / 1024).toFixed(0)} KB）`;
                    if (pages) info += ` · ${pages} 页`;
                    if (fileQueue.length > 1) info += ` | 共 ${fileQueue.length} 个文件`;
                    document.getElementById('pdfInfoBar').textContent = info;
                    document.getElementById('pdfInfoBar').style.display = 'block';
                    loading.style.display = 'none';
                })
                .catch(err => {
                    loading.style.display = 'none';
                    message.textContent = '预览失败：' + err.message;
                    message.className = 'message error';
                    hidePreview();
                });
        }

        function showPreview(blob) {
            if (pdfFileUrl) URL.revokeObjectURL(pdfFileUrl);
            pdfFileUrl = URL.createObjectURL(blob);
            const iframe = document.getElementById('pdfPreview');
            iframe.src = pdfFileUrl + '#toolbar=0&navpanes=0';
            iframe.style.display = 'block';
            document.getElementById('previewPlaceholder').style.display = 'none';
        }

        function hidePreview() {
            document.getElementById('pdfPreview').style.display = 'none';
            document.getElementById('pdfPreview').src = '';
            document.getElementById('previewPlaceholder').style.display = 'block';
            document.getElementById('pdfInfoBar').style.display = 'none';
        }

        function removeFile(index) {
            fileQueue.splice(index, 1);
            const fileListEl = document.getElementById('fileList');
            const printSettings = document.getElementById('printSettings');
            const printBtn = document.getElementById('printBtn');

            if (fileQueue.length === 0) {
                fileListEl.style.display = 'none';
                printSettings.style.display = 'none';
                printBtn.style.display = 'none';
                hidePreview();
                return;
            }

            // 重新渲染列表
            let html = `<div style="font-size:12px;color:#555;margin-bottom:6px;font-weight:500;">打印队列（${fileQueue.length} 个文件）：</div>`;
            fileQueue.forEach((f, i) => {
                html += `<div class="file-item" style="font-size:12px;color:#333;padding:4px 6px;cursor:pointer;border-radius:4px;display:flex;align-items:center;${i === 0 ? 'background:#e8f4fd;' : ''}" data-index="${i}">`;
                html += `<span onclick="previewFile(${i})" style="flex:1;">　${i + 1}. ${f.name} <span style="color:#999;">(${(f.size/1024).toFixed(0)}KB)</span></span>`;
                html += `<span onclick="removeFile(${i})" style="color:#999;cursor:pointer;padding:2px 6px;font-size:14px;" title="移除">✕</span>`;
                html += `</div>`;
            });
            fileListEl.innerHTML = html;
            fileListEl.style.display = 'block';

            // 预览第一个文件
            previewFile(0);
        }

        function previewFile(index) {
            if (index >= fileQueue.length) return;
            const file = fileQueue[index];
            const loading = document.getElementById('printLoading');
            loading.style.display = 'block';
            loading.textContent = '⏳ 正在转换预览...';

            // 高亮选中项
            document.querySelectorAll('.file-item').forEach((el, i) => {
                el.style.background = i === index ? '#e8f4fd' : '';
            });

            const formData = new FormData();
            formData.append('file', file);
            fetch('/api/preview', { method: 'POST', body: formData })
                .then(resp => {
                    if (!resp.ok) return resp.json().then(d => { throw new Error(d.error); });
                    const pages = resp.headers.get('X-Page-Count');
                    return resp.blob().then(blob => ({ blob, pages }));
                })
                .then(({ blob, pages }) => {
                    showPreview(blob);
                    let info = `${file.name}（${(file.size / 1024).toFixed(0)} KB）`;
                    if (pages) info += ` · ${pages} 页`;
                    info += ` | 第 ${index + 1}/${fileQueue.length} 个文件`;
                    document.getElementById('pdfInfoBar').textContent = info;
                    document.getElementById('pdfInfoBar').style.display = 'block';
                    loading.style.display = 'none';
                })
                .catch(err => {
                    loading.style.display = 'none';
                });
        }

        async function doPrint() {
            const ip = document.getElementById('printerIp').value.trim();
            const copies = document.getElementById('copies').value;
            const duplex = document.getElementById('duplex').value;
            const orientation = document.getElementById('orientation').value;
            const scaling = document.getElementById('scaling').value;
            const pages = document.getElementById('pages').value.trim();
            const printBtn = document.getElementById('printBtn');
            const loading = document.getElementById('printLoading');
            const message = document.getElementById('printMessage');

            if (!ip) { message.textContent = '请输入打印机 IP'; message.className = 'message error'; return; }
            if (fileQueue.length === 0) { message.textContent = '请选择文件'; message.className = 'message error'; return; }

            printBtn.disabled = true;
            message.textContent = '';

            let lastJobId = null;

            for (let i = 0; i < fileQueue.length; i++) {
                const file = fileQueue[i];
                loading.style.display = 'block';
                loading.textContent = fileQueue.length > 1
                    ? `⏳ 正在打印第 ${i + 1}/${fileQueue.length} 个文件：${file.name}`
                    : '⏳ 正在发送打印任务...';

                const formData = new FormData();
                formData.append('printer_ip', ip);
                formData.append('file', file);
                formData.append('copies', copies);
                formData.append('duplex', duplex);
                formData.append('orientation', orientation);
                formData.append('scaling', scaling);
                formData.append('color_mode', document.getElementById('colorMode').value);
                // 页码范围只对单文件生效
                if (pages && fileQueue.length === 1) formData.append('pages', pages);

                try {
                    const resp = await fetch('/api/print', { method: 'POST', body: formData });
                    let data;
                    try {
                        data = await resp.json();
                    } catch (jsonErr) {
                        message.textContent = `${file.name} 打印失败：服务器响应异常（可能超时），请重试`;
                        message.className = 'message error';
                        break;
                    }
                    if (!data.success) {
                        message.textContent = `${file.name} 打印失败：${data.error || data.message}`;
                        message.className = 'message error';
                        break;
                    }
                    lastJobId = data.job_id;
                } catch (e) {
                    message.textContent = `${file.name} 打印失败：网络错误，请重试`;
                    message.className = 'message error';
                    break;
                }
            }

            loading.style.display = 'none';

            if (!message.textContent) {
                message.textContent = fileQueue.length > 1
                    ? `全部 ${fileQueue.length} 个文件已提交打印`
                    : '打印任务已提交';
                message.className = 'message success';
            }

            // 轮询最后一个任务状态
            if (lastJobId) {
                pollJobStatus(ip, lastJobId, message, loading);
            }

            printBtn.disabled = false;
        }

        async function pollJobStatus(ip, jobId, messageEl, loadingEl) {
            const stateMap = {
                'pending': '排队中...',
                'processing': '打印中...',
                'completed': '✅ 打印完成',
                'canceled': '已取消',
                'aborted': '打印中断',
            };

            let attempts = 0;
            const maxAttempts = 30;  // 最多轮询 30 次（30 秒）

            const poll = async () => {
                attempts++;
                try {
                    const resp = await fetch('/api/job-status', {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({printer_ip: ip, job_id: jobId})
                    });
                    const data = await resp.json();
                    const state = data.state || 'unknown';
                    const display = stateMap[state] || state;

                    messageEl.textContent = display;
                    messageEl.className = state === 'completed' ? 'message success' : 'message';

                    // 继续轮询（未完成且未超时）
                    if (!['completed', 'canceled', 'aborted'].includes(state) && attempts < maxAttempts) {
                        setTimeout(poll, 1000);
                    }
                } catch (e) {
                    // 查询失败就停止
                }
            };

            setTimeout(poll, 1000);
        }

        // === 扫描功能 ===
        async function doScan() {
            const scanBtn = document.getElementById('scanBtn');
            const loading = document.getElementById('scanLoading');
            const message = document.getElementById('scanMessage');
            scanBtn.disabled = true; loading.style.display = 'block'; message.textContent = '';
            try {
                const resp = await fetch('/api/scan', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        session_id: sessionId,
                        scanner_ip: document.getElementById('printerIp').value.trim(),
                        dpi: parseInt(document.getElementById('dpi').value),
                        color: document.getElementById('color').value,
                    })
                });
                const data = await resp.json();
                if (data.success) {
                    sessionId = data.session_id; pageCount = data.page_count;
                    document.getElementById('pageCount').style.display = 'block';
                    document.getElementById('count').textContent = pageCount;
                    document.getElementById('downloadBtn').style.display = 'block';
                    document.getElementById('cancelBtn').style.display = 'block';
                    message.textContent = data.message;
                    scanBtn.textContent = '继续扫描下一页';
                } else { message.textContent = data.error; message.className = 'message error'; }
            } catch (e) { message.textContent = '扫描失败：' + e.message; message.className = 'message error'; }
            scanBtn.disabled = false; loading.style.display = 'none';
        }

        async function doDownload() {
            if (!sessionId) return;
            try {
                const resp = await fetch('/api/download', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({session_id: sessionId})
                });
                if (resp.ok) {
                    const blob = await resp.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url;
                    a.download = `scan_${new Date().toISOString().slice(0,10)}.pdf`;
                    a.click(); URL.revokeObjectURL(url); resetScanUI();
                } else { const data = await resp.json(); alert('下载失败：' + data.error); }
            } catch (e) { alert('下载失败：' + e.message); }
        }

        async function doCancel() {
            if (sessionId) {
                await fetch('/api/cancel', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({session_id: sessionId})
                });
            }
            resetScanUI();
        }

        function resetScanUI() {
            sessionId = null; pageCount = 0;
            document.getElementById('pageCount').style.display = 'none';
            document.getElementById('downloadBtn').style.display = 'none';
            document.getElementById('cancelBtn').style.display = 'none';
            document.getElementById('scanMessage').textContent = '';
            document.getElementById('scanBtn').textContent = '开始扫描';
        }
    </script>
</body>
</html>
